<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <link rel="manifest" href="manifest.json">
  <meta name="theme-color" content="#0f0f13">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="Great Tunes">
  <link rel="apple-touch-icon" sizes="180x180" href="apple-touch-icon.png">
  <link rel="icon" type="image/svg+xml" href="favicon.svg">
  <link rel="icon" type="image/png" sizes="192x192" href="icons/icon-192.png">
  <title>Great Tunes</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/zacharyzimmerman/great-apps@main/framework.css">
  <link rel="stylesheet" href="styles.css?v=0.3.12">
</head>
<body>
  <!-- List view (main screen) -->
  <div id="list-view" class="view">
    <header class="list-header">
      <div class="header-row">
        <h1>Great<span class="header-accent">Tunes</span></h1>
        <button id="search-toggle" class="icon-btn" aria-label="Search">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
        </button>
      </div>
      <div id="search-bar" class="search-bar" hidden>
        <input type="text" id="search" placeholder="Search tunes..." autocomplete="off">
        <select id="quartet-filter">
          <option value="">All Quartets</option>
          <option value="Air Fours">Air Fours</option>
          <option value="Avant Garde">Avant Garde</option>
          <option value="Four-Do-Matics">Four-Do-Matics</option>
          <option value="GayNotes">GayNotes</option>
          <option value="Golden Staters">Golden Staters</option>
          <option value="Lads Of Enchantment">Lads Of Enchantment</option>
          <option value="Saints">Saints</option>
          <option value="Sidewinders">Sidewinders</option>
          <option value="Sundowners">Sundowners</option>
        </select>
        <select id="sort-by">
          <option value="year">By Year</option>
          <option value="title">By Title</option>
          <option value="quartet">By Quartet</option>
          <option value="rank">By Rank</option>
        </select>
      </div>
    </header>
    <div id="song-list" class="item-list"></div>
    <footer class="list-footer">
      <span id="song-count"></span>
      <span class="version-label">v0.3.12</span>
    </footer>
  </div>

  <!-- Detail view (shown when a song is selected) -->
  <div id="detail-view" class="view" hidden>
    <header class="detail-header">
      <button id="back-btn" class="back-btn" aria-label="Back to list">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="15 18 9 12 15 6"/></svg>
        Back
      </button>
    </header>
    <div class="detail-body">
      <h2 id="song-title"></h2>
      <div class="detail-meta">
        <span class="meta-text" id="song-quartet"></span>
        <span class="meta-text" id="song-year"></span>
        <span class="pill-accent" id="song-rank"></span>
      </div>
      <div id="audio-section" class="audio-section" hidden>
        <audio id="audio-player" controls preload="metadata"></audio>
      </div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/gh/zacharyzimmerman/great-apps@main/framework.js"></script>
  <script src="app.js?v=0.3.12"></script>
</body>
</html>
